<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPM · PersonOverlay · Interactive Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#060910;color:#e8edf5;font-family:'DM Sans',sans-serif}

/* ═══════════════════════════════════════════════════
   IPM DESIGN SYSTEM TOKENS
   ═══════════════════════════════════════════════════ */
:root {
  --bg-deep: #040810;
  --bg-base: #060910;
  --bg-panel: rgba(8,11,17,0.96);
  --bg-card: rgba(255,255,255,0.02);
  --border-subtle: rgba(255,255,255,0.04);
  --border-medium: rgba(255,255,255,0.08);
  --border-cyan: rgba(0,229,255,0.08);

  --text-primary: #e8edf5;
  --text-secondary: #d0d8e4;
  --text-muted: #8a9bb5;
  --text-dim: #6b7a90;
  --text-label: #5a6b80;

  --cyan: #00e5ff;
  --green: #00d4aa;
  --gold: #f5a623;
  --red: #e53935;
  --purple: #a855f7;

  --font-heading: 'Rajdhani', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ═══ OVERLAY SHELL ═══ */
.ov{position:absolute;inset:0;z-index:50;font-family:var(--font-body)}

/* ═══ SOLO VIEW: 2-col grid ═══ */
.ov--solo{display:grid;grid-template-columns:280px 1fr;grid-template-rows:1fr 32px}

/* ═══ STUDIO RELATION: 3-col grid ═══ */
.ov--relation{display:grid;grid-template-columns:260px 1fr 260px;grid-template-rows:1fr 32px}

/* Panel */
.ov__panel{background:var(--bg-panel);overflow-y:auto;display:flex;flex-direction:column;gap:0;scrollbar-width:none}
.ov__panel::-webkit-scrollbar{display:none}
.ov__panel--left{border-right:1px solid var(--border-cyan)}
.ov__panel--right{border-left:1px solid rgba(255,255,255,0.07)}

/* Labels */
.ov__label{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.12em;color:var(--text-label);margin-bottom:8px;text-transform:uppercase}

/* Badges */
.badge{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:0.04em;white-space:nowrap;display:inline-flex;align-items:center}
.badge--teal{color:var(--cyan);background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2)}
.badge--gold{color:var(--gold);background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.2)}
.badge--red{color:var(--red);background:rgba(229,57,53,0.06);border:1px solid rgba(229,57,53,0.2)}
.badge--purple{color:var(--purple);background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.2)}
.badge--green{color:var(--green);background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.2)}

/* Photo */
.photo-wrap{position:relative;width:100%;background:var(--bg-base)}
.photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:brightness(0.92) contrast(1.05)}
.photo-fade{position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,rgba(8,11,17,0.99))}

.divider{height:1px;background:linear-gradient(90deg,transparent 5%,rgba(0,229,255,0.1) 50%,transparent 95%);flex-shrink:0}

/* Identity */
.pe-name{font-family:var(--font-heading);font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.02em;line-height:1.1}
.pe-title{font-family:var(--font-body);font-size:11px;color:var(--text-muted);margin-top:4px}
.pe-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}

/* Company row */
.co-row{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;border-radius:4px;transition:background 0.15s}
.co-row:hover{background:rgba(255,255,255,0.03)}
.co-icon{width:24px;height:24px;border-radius:5px;flex-shrink:0;background:rgba(255,255,255,0.03);border:1px solid var(--border-medium);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700}
.co-name{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.co-edge{font-family:var(--font-mono);font-size:9px;color:var(--text-label);margin-left:auto;padding-left:6px;flex-shrink:0}
.co-cap{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--cyan);flex-shrink:0}

/* Person row */
.pr{display:flex;align-items:center;gap:8px;padding:7px 4px;cursor:pointer;border-radius:5px;transition:background 0.15s}
.pr:hover{background:rgba(0,229,255,0.03)}
.pr+.pr{border-top:1px solid var(--border-subtle)}
.pr-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700}
.pr-name{font-family:var(--font-body);font-size:13px;font-weight:500;color:#e0e6ef}
.pr-role{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:1px}
.pr-score{font-family:var(--font-mono);font-size:13px;font-weight:700;flex-shrink:0}

/* Signal */
.sig{display:flex;gap:9px;padding:8px 0}
.sig+.sig{border-top:1px solid var(--border-subtle)}
.sig-bar{width:3px;flex-shrink:0;border-radius:2px;align-self:stretch}
.sig-src{font-family:var(--font-mono);font-size:9px;font-weight:700}
.sig-age{font-family:var(--font-mono);font-size:9px;color:var(--text-label);margin-left:6px}
.sig-hl{font-family:var(--font-body);font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:3px}

/* KV Grid */
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kv-cell{background:var(--bg-card);border-radius:5px;padding:9px 10px;border:1px solid var(--border-subtle)}
.kv-key{font-family:var(--font-mono);font-size:9px;color:var(--text-label);letter-spacing:0.06em;margin-bottom:3px;text-transform:uppercase}
.kv-val{font-family:var(--font-mono);font-size:13px;color:#e0e6ef;font-weight:600}

/* Risk card */
.risk-card{border-radius:5px;padding:10px 12px}
.risk-card--critical{background:rgba(229,57,53,0.04);border:1px solid rgba(229,57,53,0.15)}
.risk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.risk-name{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#e0e6ef}
.risk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.risk-label{font-family:var(--font-mono);font-size:9px;color:var(--text-label);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px}
.risk-value{font-family:var(--font-mono);font-size:14px;font-weight:700}

/* Data Grid rows */
.grid-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid rgba(255,255,255,0.05)}
.grid-row-2{display:grid;grid-template-columns:1fr 1fr}
.grid-cell{padding:14px 16px}
.grid-cell+.grid-cell{border-left:1px solid rgba(255,255,255,0.05)}

/* Tabs */
.tab{padding:5px 12px;border-radius:5px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:0.06em;cursor:pointer;white-space:nowrap;transition:all 0.18s;border:1px solid transparent;background:transparent;color:var(--text-label)}
.tab:hover{color:rgba(255,255,255,0.65)}
.tab--active{color:var(--cyan);background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.2);font-weight:700}

/* Sector */
.sector{font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:3px}
.sector--primary{color:var(--cyan);background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2)}
.sector-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
.sector-name{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,0.78)}

/* Facility */
.facility{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start;padding:7px 8px;border-radius:4px;background:var(--bg-card);border:1px solid var(--border-subtle)}
.facility-name{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)}
.facility-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-label);margin-top:1px}

/* Bottom bar */
.bottom-bar{height:32px;background:rgba(4,6,12,0.98);border-top:1px solid rgba(0,229,255,0.06);display:flex;align-items:center;padding:0 16px;gap:10px;font-family:var(--font-mono);font-size:10px;grid-column:1/-1}
.bar-sep{width:1px;height:12px;background:var(--border-medium)}
.bar-label{color:var(--text-label);font-size:9px}
.bar-value{font-weight:700;font-size:11px}
.bar-value--teal{color:var(--cyan)}
.bar-value--gold{color:var(--gold)}
.live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

/* Close btn */
.close-btn{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid var(--border-medium);color:var(--text-label);font-family:var(--font-mono);font-size:14px;transition:all 0.15s;position:absolute;top:10px;right:10px;z-index:60}
.close-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* ═══ EGO NETWORK VISUAL ═══ */
.visual-zone{
  flex:1;position:relative;min-height:0;overflow:hidden;
  background:
    radial-gradient(ellipse 60% 50% at 40% 45%, rgba(0,229,255,0.015) 0%, transparent 100%),
    radial-gradient(ellipse 70% 60% at 60% 55%, rgba(10,20,38,0.8) 0%, #040810 100%);
}

/* View switcher */
.vs-wrap{position:absolute;top:10px;right:10px;z-index:20;display:flex;gap:2px;background:rgba(4,8,18,0.9);border:1px solid rgba(0,229,255,0.1);border-radius:6px;padding:3px;backdrop-filter:blur(12px)}
.vs-btn{padding:4px 10px;font-size:9px;font-weight:700;font-family:var(--font-mono);letter-spacing:0.06em;cursor:pointer;border-radius:4px;transition:all 0.18s;border:1px solid transparent;background:transparent;color:#3a4a60}
.vs-btn:hover{color:var(--text-muted)}
.vs-btn--active{color:var(--cyan);background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.2)}

/* Node info panel */
.ni{
  position:absolute;bottom:14px;left:14px;z-index:30;
  width:230px;background:rgba(6,10,20,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,0.15);border-radius:8px;
  overflow:hidden;box-shadow:0 4px 30px rgba(0,0,0,0.5),0 0 30px rgba(0,229,255,0.06);
  animation:ni-in 0.3s ease;
}
@keyframes ni-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ni-header{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px}
.ni-avatar{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;flex-shrink:0}
.ni-name{font-family:var(--font-heading);font-size:15px;font-weight:700;color:#fff;line-height:1.15}
.ni-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-label);margin-top:1px;display:flex;gap:6px;align-items:center}
.ni-close{margin-left:auto;width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-label);font-size:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:all 0.15s;flex-shrink:0}
.ni-close:hover{color:var(--cyan);border-color:rgba(0,229,255,0.3)}
.ni-section{padding:10px 14px;border-bottom:1px solid var(--border-subtle)}
.ni-section:last-child{border-bottom:none}

/* Ideology scores */
.score-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.score-label{font-family:var(--font-mono);font-size:9px;color:var(--text-label);width:68px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em}
.score-track{flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;position:relative}
.score-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.1)}
.score-fill{position:absolute;top:0;height:100%;border-radius:3px}
.score-val{font-family:var(--font-mono);font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
.score-sub{font-family:var(--font-mono);font-size:9px;color:var(--text-label);margin-top:-4px;margin-bottom:6px;margin-left:74px}

/* Edge rows in node info */
.ni-edge{display:flex;align-items:center;gap:6px;padding:4px 0}
.ni-edge+.ni-edge{border-top:1px solid rgba(255,255,255,0.03)}
.ni-edge-dot{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.ni-edge-type{font-family:var(--font-mono);font-size:9px;color:var(--text-label);width:68px;flex-shrink:0;text-transform:uppercase}
.ni-edge-target{font-family:var(--font-body);font-size:11px;color:var(--text-secondary);font-weight:500;flex:1}
.ni-edge-strength{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0}

/* Node info actions */
.ni-actions{padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.ni-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 0;border-radius:4px;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border:none}
.ni-btn--primary{color:var(--bg-deep);background:var(--cyan)}
.ni-btn--primary:hover{background:#33ecff}
.ni-btn--secondary{color:var(--cyan);background:transparent;border:1px solid rgba(0,229,255,0.2)}
.ni-btn--secondary:hover{background:rgba(0,229,255,0.06)}

/* Right area */
.pe-right{display:flex;flex-direction:column;overflow:hidden}
.pe-nav{display:flex;justify-content:center;gap:4px;padding:8px 16px;flex-shrink:0;background:rgba(4,6,12,0.96);border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05)}
.pe-data{flex:1;min-height:0;overflow-y:auto;background:rgba(5,8,14,0.98);scrollbar-width:none}
.pe-data::-webkit-scrollbar{display:none}

/* SVG graph node hover */
.graph-node{cursor:pointer;transition:opacity 0.15s}
.graph-node:hover{opacity:0.85}

/* ═══ STUDIO RELATION CENTER ═══ */
.sr-center{display:flex;flex-direction:column;overflow:hidden;background:rgba(4,7,12,0.5);border-left:1px solid rgba(255,255,255,0.07);border-right:1px solid rgba(255,255,255,0.07)}
.sr-header{flex-shrink:0;padding:20px 24px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(6,9,14,0.8)}
.sr-kicker{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
.sr-label{font-family:var(--font-heading);font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:-0.01em;margin-bottom:4px}
.sr-type{font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em}
.sr-arc{position:relative;height:64px;margin:14px 0 4px}
.sr-arc-ent{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:8px}
.sr-arc-ent--left{left:16px}
.sr-arc-ent--right{right:16px}
.sr-arc-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,229,255,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--cyan);background:radial-gradient(circle at 40% 35%,#1a2a45,#0a1628)}
.sr-arc-avatar img{width:100%;height:100%;object-fit:cover}

.sr-content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:18px;scrollbar-width:none}
.sr-content::-webkit-scrollbar{display:none}

/* Strength meter */
.str-meter{padding:14px 16px;border-radius:6px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.07)}
.str-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.str-label{font-family:var(--font-mono);font-size:10px;color:#7a8ba0;letter-spacing:0.08em;text-transform:uppercase}
.str-val{font-family:var(--font-mono);font-size:20px;font-weight:700}
.str-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.str-fill{height:100%;border-radius:3px;transition:width 0.6s}

/* Details grid */
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* Power dynamic */
.power-dyn{font-family:var(--font-body);font-size:12px;color:#c4cdd8;line-height:1.55;padding:12px 14px;border-radius:5px;background:rgba(168,85,247,0.03);border-left:3px solid rgba(168,85,247,0.4)}

/* Analysis desc */
.analysis-desc{font-family:var(--font-body);font-size:12px;color:#9aacbf;line-height:1.6;padding:14px;border-radius:5px;background:rgba(0,229,255,0.02);border:1px solid rgba(0,229,255,0.08)}

/* Levers */
.lever-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:5px}
.lever{display:flex;align-items:flex-start;gap:8px;font-family:var(--font-body);font-size:11px;color:#9aacbf;line-height:1.45}
.lever-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* Timeline card */
.tl-card{padding:12px;border-radius:5px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.07);margin-bottom:6px}
.tl-q{font-family:var(--font-body);font-size:12px;color:var(--text-primary);line-height:1.45;margin-bottom:8px}
.tl-bar{display:flex;align-items:center;gap:10px}
.tl-track{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.tl-fill{height:100%;border-radius:2px}
.tl-pct{font-family:var(--font-mono);font-size:11px;font-weight:700;width:36px;text-align:right}

/* Shared connections */
.shared-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.shared-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);color:var(--cyan)}
.shared-name{font-family:var(--font-body);font-size:12px;color:var(--text-primary);font-weight:500}
.shared-type{font-family:var(--font-mono);font-size:9px;color:#7a8ba0;margin-top:1px}

/* Back button */
.back-btn{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text-dim);cursor:pointer;padding:4px 0;transition:color 0.15s;background:none;border:none}
.back-btn:hover{color:var(--cyan)}

/* Entity panel for relation */
.ent-panel{background:var(--bg-panel);overflow-y:auto;display:flex;flex-direction:column;gap:0;scrollbar-width:none}
.ent-panel::-webkit-scrollbar{display:none}

/* ═══ CINEMATIC TRANSITION ═══ */
.cinematic{
  position:fixed;inset:0;z-index:200;
  animation:cin-in 0.3s ease, cin-out 0.3s ease 0.5s forwards;
}
.cin-bg{
  position:absolute;inset:-20px;
  background-size:cover;background-position:center;
  filter:brightness(0.35) contrast(1.2) saturate(1.1);
  animation:ken-burns 0.8s ease forwards;
}
.cin-gradient{
  position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(4,8,16,0.7) 0%, rgba(4,8,16,0.2) 40%, rgba(4,8,16,0.85) 100%);
}
.cin-label{
  position:absolute;bottom:15%;left:5%;
  font-family:var(--font-heading);font-size:48px;font-weight:700;color:#fff;
  letter-spacing:-0.02em;text-shadow:0 2px 20px rgba(0,0,0,0.5);
  opacity:0;animation:fade-up 0.4s ease 0.15s forwards;
}
.cin-sub{
  position:absolute;bottom:10%;left:5%;

  bindEvents();

// ═══════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════

function bindEvents() {
  // Graph node clicks
  document.querySelectorAll('.graph-node').forEach(el => {
    el.addEventListener('click', () => {
      setState({ selectedNode: el.dataset.node });
    });
  });

  // Close node info
  document.querySelectorAll('[data-close-ni]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      setState({ selectedNode: null });
    });
  });

  // Open Studio Relation (from node info button)
  document.querySelectorAll('[data-action="open-relation"]').forEach(el => {
    el.addEventListener('click', () => openRelation());
  });

  // Open relation from connection row
  document.querySelectorAll('[data-open-relation="trump"]').forEach(el => {
    el.addEventListener('click', () => openRelation());
  });

  // Back to solo
  document.querySelectorAll('[data-action="back-to-solo"]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ view: 'solo', selectedNode: 'trump' });
    });
  });

  // Tab switching
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ activeTab: el.dataset.tab });
    });
  });

  // View switcher
  document.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      setState({ graphView: el.dataset.view });
    });
  });

  // Cinematic auto-complete
  if (state.view === 'transition') {
    setTimeout(() => {
      setState({ view: 'relation' });
    }, 800);
  }
}

function openRelation() {
  setState({
    view: 'transition',
    transitionLabel: 'WASHINGTON',
    transitionSub: 'Studio Relation · Allied',
  });
}

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)].join(',');
}
